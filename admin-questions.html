<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All Questions - Standup Admin</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@500&display=swap"
      rel="stylesheet"
    />
    <style>
      * { box-sizing: border-box; }
      .admin-root.game-root { padding-bottom: 24px; }
      .wrap { max-width: 1080px; margin: 0 auto; padding: 14px; position: relative; z-index: 4; }
      .card { border: 1px solid color-mix(in oklab, var(--border) 76%, var(--neon)); border-radius: 16px; background: linear-gradient(180deg, rgba(10,8,20,.95), rgba(7,7,15,.95)); box-shadow: 0 16px 40px rgba(0,0,0,.36); padding: 14px; }
      .head { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
      .title { margin: 0; font-family: var(--display); letter-spacing: .08em; font-size: 1.1rem; }
      .toolbar { display: flex; gap: 8px; align-items: center; }
      .btn { border: 1px solid color-mix(in oklab, var(--border) 72%, var(--neon)); background: #0a0916; color: var(--text); border-radius: 10px; padding: 8px 12px; font: 700 .78rem var(--display); text-transform: uppercase; letter-spacing: .06em; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; }
      .btn:hover { border-color: var(--neon); }
      .q-list { margin-top: 12px; display: grid; gap: 8px; max-height: 75vh; overflow: auto; }
      .q-item { border: 1px solid var(--border); border-radius: 11px; background: #0a0b18; padding: 10px; }
      .meta { font: 700 .66rem var(--display); color: var(--neon); letter-spacing: .08em; text-transform: uppercase; }
      .q-text { margin-top: 6px; font-size: .93rem; }
      .q-row { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; gap: 8px; }
      .q-actions { display: flex; gap: 7px; }
      .icon-btn { border: 1px solid var(--border); background: #0b0b18; color: var(--text); border-radius: 8px; padding: 6px 8px; display: inline-flex; cursor: pointer; }
      .icon-btn:hover { border-color: var(--neon); }
      .icon-btn.danger { border-color: color-mix(in oklab, var(--danger) 60%, var(--border)); }
      .msg { margin-top: 10px; min-height: 18px; font-weight: 700; }
    </style>
  </head>
  <body>
    <div class="admin-root game-root">
      <div class="crt-scanlines" aria-hidden="true"></div>
      <div class="crt-vignette" aria-hidden="true"></div>
      <div class="marquee-strip" aria-hidden="true"><div class="marquee-inner"><span>ALL QUESTIONS · READ MODE · ADMIN ·</span><span>ALL QUESTIONS · READ MODE · ADMIN ·</span></div></div>
      <div class="wrap">
        <section class="card">
          <div class="head">
            <h1 class="title">All Questions</h1>
            <div class="toolbar">
              <button id="refresh" class="btn" type="button">Refresh</button>
              <a href="/admin?tab=questions" class="btn">Back</a>
            </div>
          </div>
          <p id="msg" class="msg"></p>
          <div id="q-list" class="q-list"></div>
        </section>
      </div>
    </div>
    <script src="https://unpkg.com/feather-icons"></script>
    <script src="admin-questions.js"></script>
  </body>
</html>
